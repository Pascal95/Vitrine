<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBR Shot — Nous contacter</title>
  <meta name="description" content="Retrouvez FBR Shot sur tous nos canaux : site web, Instagram, WhatsApp et email.">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #FFAB41;
      --primary-d: #FF9920;
      --secondary: #605BE5;
      --sec-d:     #4A47B8;
      --white:     #FFFFFF;
      --gray-100:  #F8F9FA;
      --gray-200:  #E9ECEF;
      --text:      #333333;
      --text-muted:#777777;
      --radius:    1rem;
      --transition:300ms ease;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      background: var(--gray-100);
      padding: 2rem 1.25rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle ambient blobs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      top: -150px; left: -150px;
      background: var(--primary);
    }
    body::after {
      width: 500px; height: 500px;
      bottom: -150px; right: -150px;
      background: var(--secondary);
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border-radius: 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 4px 16px rgba(0,0,0,0.06);
      padding: 3rem 2.5rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: 110px;
      height: auto;
      margin-bottom: 1.5rem;
    }

    /* Heading */
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.75rem;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .brand-tagline {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      margin: 0 auto 2.5rem;
    }

    /* Buttons list */
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-radius: var(--radius);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .link-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
    }
    .link-btn:hover::after { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 0.625rem;
      background: rgba(255,255,255,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.25rem;
      line-height: 1;
    }

    .link-label {
      flex: 1;
      text-align: left;
    }
    .link-label span {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.85;
      margin-bottom: 0.15rem;
    }

    .link-arrow {
      opacity: 0.6;
      font-size: 1.1rem;
      margin-left: auto;
    }

    /* --- Button themes --- */
    .btn-website {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-d) 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,171,65,0.35);
    }

    .btn-instagram {
      background: linear-gradient(135deg, #833AB4 0%, #E1306C 50%, #F77737 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(225,48,108,0.30);
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(37,211,102,0.30);
    }

    .btn-email {
      background: linear-gradient(135deg, var(--secondary) 0%, var(--sec-d) 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(96,91,229,0.30);
    }

    /* Footer mention */
    .card-footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* SVG icons inline */
    .icon-svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.5rem 2rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="assets/images/gallery/logofbr.png" alt="FBR Shot" class="logo" onerror="this.style.display='none'">

    <h1 class="brand-name">FBR Shot</h1>

</body>
